name: Build and Deploy

on:
  push:
    branches:
      - main
  release:
    types:
      - published

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-push:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: image
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_PRERELEASE: ${{ github.event.release.prerelease }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          image="ghcr.io/${REPOSITORY,,}"
          short_sha="${SHA::12}"

          tags=""

          if [[ "$EVENT_NAME" == "push" ]]; then
            tags="${image}:nightly"
            tags+=$'\n'"${image}:sha-${short_sha}"
          elif [[ "$EVENT_NAME" == "release" ]]; then
            tags="${image}:${RELEASE_TAG}"
            if [[ "$RELEASE_PRERELEASE" != "true" ]]; then
              tags+=$'\n'"${image}:latest"
            fi
          else
            echo "Unsupported event: $EVENT_NAME" >&2
            exit 1
          fi

          {
            echo "image=$image"
            echo "tags<<EOF"
            echo "$tags"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.aws
          push: true
          platforms: ${{ vars.DOCKER_PLATFORMS != '' && vars.DOCKER_PLATFORMS || 'linux/arm64' }}
          tags: ${{ steps.image.outputs.tags }}

  deploy-dev:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Trigger ECS deployment (dev)
        run: |
          aws ecs update-service \
            --cluster "${{ vars.ECS_DEV_CLUSTER }}" \
            --service "${{ vars.ECS_DEV_SERVICE }}" \
            --force-new-deployment

  deploy-prod:
    if: github.event_name == 'release' && github.event.release.prerelease == false
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Trigger ECS deployment (prod)
        run: |
          aws ecs update-service \
            --cluster "${{ vars.ECS_PROD_CLUSTER }}" \
            --service "${{ vars.ECS_PROD_SERVICE }}" \
            --force-new-deployment
